<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AIMTG 議事録 全体像 図解5案</title>
    <style>
      :root {
        --ink: #0a0d0f;
        --muted: #5b6a72;
        --line: #d9e0e4;
        --paper: #f4f7f9;
        --surface: #ffffff;
        --blue: #1e7bd8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--paper);
        color: var(--ink);
        font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
        letter-spacing: 0;
      }

      .page {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
        padding: 34px 0 54px;
      }

      header {
        display: grid;
        gap: 8px;
        margin-bottom: 24px;
        border-bottom: 1px solid var(--line);
        padding-bottom: 18px;
      }

      h1 {
        margin: 0;
        font-size: clamp(28px, 4vw, 46px);
        line-height: 1.15;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.75;
        font-weight: 700;
      }

      .grid {
        display: grid;
        gap: 22px;
      }

      figure {
        margin: 0;
        border: 1px solid var(--line);
        border-radius: 8px;
        overflow: hidden;
        background: var(--surface);
        box-shadow: 0 20px 50px rgba(10, 13, 15, 0.08);
      }

      img {
        display: block;
        width: 100%;
        height: auto;
      }

      figcaption {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        padding: 14px 16px;
        border-top: 1px solid var(--line);
        color: #314145;
        font-weight: 900;
      }

      span {
        color: var(--blue);
        font-size: 13px;
        font-weight: 900;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <header>
        <h1>AIMTG 議事録 全体像 図解5案</h1>
        <p>案2の黒×ブルーアクセントをベースに、議事録の内容を一目で把握しやすい構成パターンへ振り直した案です。すべてimage-gen2生成、ロゴなし。</p>
      </header>

      <section class="grid">
        <figure>
          <img src="./overview-01-executive-canvas.png" alt="全体像図解案1 エグゼクティブキャンバス" />
          <figcaption>案1 エグゼクティブキャンバス <span>サマリー中心に6要素を俯瞰</span></figcaption>
        </figure>
        <figure>
          <img src="./overview-02-timeline-map.png" alt="全体像図解案2 タイムラインマップ" />
          <figcaption>案2 タイムラインマップ <span>背景から次回までの流れを把握</span></figcaption>
        </figure>
        <figure>
          <img src="./overview-03-matrix-board.png" alt="全体像図解案3 マトリクスボード" />
          <figcaption>案3 マトリクスボード <span>テーマ別に論点・決定・担当を整理</span></figcaption>
        </figure>
        <figure>
          <img src="./overview-04-priority-radar.png" alt="全体像図解案4 優先度レーダー" />
          <figcaption>案4 優先度レーダー <span>重要論点と実行優先度を可視化</span></figcaption>
        </figure>
        <figure>
          <img src="./overview-05-meeting-dashboard.png" alt="全体像図解案5 会議ダッシュボード" />
          <figcaption>案5 会議ダッシュボード <span>サマリー・決定・行動を一画面化</span></figcaption>
        </figure>
      </section>
    </main>
  </body>
</html>
