<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FRACTAL WORKOUT 議事録アーカイブ 図解5案</title>
    <style>
      :root {
        --ink: #0a0d0f;
        --muted: #627174;
        --line: #d7ddde;
        --paper: #f5f7f7;
        --surface: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--paper);
        color: var(--ink);
        font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
        letter-spacing: 0;
      }

      .page {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
        padding: 34px 0 54px;
      }

      header {
        display: grid;
        gap: 8px;
        margin-bottom: 24px;
        border-bottom: 1px solid var(--line);
        padding-bottom: 18px;
      }

      h1 {
        margin: 0;
        font-size: clamp(28px, 4vw, 46px);
        line-height: 1.15;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.75;
        font-weight: 700;
      }

      .grid {
        display: grid;
        gap: 22px;
      }

      figure {
        margin: 0;
        border: 1px solid var(--line);
        border-radius: 8px;
        overflow: hidden;
        background: var(--surface);
        box-shadow: 0 20px 50px rgba(10, 13, 15, 0.08);
      }

      img {
        display: block;
        width: 100%;
        height: auto;
      }

      figcaption {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        padding: 14px 16px;
        border-top: 1px solid var(--line);
        color: #314145;
        font-weight: 900;
      }

      span {
        color: var(--muted);
        font-size: 13px;
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <header>
        <h1>FRACTAL WORKOUT 議事録アーカイブ 図解5案</h1>
        <p>image-gen2で生成。図解内にロゴは入れず、既存の黒×グレー基調に別アクセント色を加えた比較案です。</p>
      </header>

      <section class="grid">
        <figure>
          <img src="./variant-01-teal.png" alt="図解案1 ティールアクセント" />
          <figcaption>案1 ティールアクセント <span>黒 / グレー / ティール</span></figcaption>
        </figure>
        <figure>
          <img src="./variant-02-blue.png" alt="図解案2 ブルーアクセント" />
          <figcaption>案2 ブルーアクセント <span>黒 / スレート / ブルー</span></figcaption>
        </figure>
        <figure>
          <img src="./variant-03-emerald.png" alt="図解案3 エメラルドアクセント" />
          <figcaption>案3 エメラルドアクセント <span>黒 / グラファイト / エメラルド</span></figcaption>
        </figure>
        <figure>
          <img src="./variant-04-coral.png" alt="図解案4 コーラルアクセント" />
          <figcaption>案4 コーラルアクセント <span>黒 / シルバー / コーラル</span></figcaption>
        </figure>
        <figure>
          <img src="./variant-05-amber-teal.png" alt="図解案5 アンバーとティールのアクセント" />
          <figcaption>案5 アンバー×ティール <span>黒 / シルバー / アンバー / ティール</span></figcaption>
        </figure>
      </section>
    </main>
  </body>
</html>
